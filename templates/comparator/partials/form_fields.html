{% if form.non_field_errors %}<div class="form-errors">{{ form.non_field_errors }}</div>{% endif %}
<div class="form-grid">
  {% for field in form %}
    <div class="field {% if field.field.widget.input_type == 'checkbox' %}checkbox{% endif %}">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
      {% if field.help_text %}<small>{{ field.help_text }}</small>{% endif %}
      {% for error in field.errors %}<span class="error">{{ error }}</span>{% endfor %}
    </div>
  {% endfor %}
</div>
