{% extends "base.html" %}
{% block title %}{{ title }} · PriceMatch{% endblock %}
{% block content %}
<div class="page-head"><div><p class="eyebrow">Date manuale</p><h1>{{ title }}</h1></div></div>
<section class="panel form-panel">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {% include "comparator/partials/form_fields.html" %}
    <div class="form-actions"><button class="button primary" type="submit">Salvează</button><a class="button" href="javascript:history.back()">Înapoi</a></div>
  </form>
</section>
{% endblock %}
